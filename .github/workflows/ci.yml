name: CI

on:
  push:
    branches: [main, oss-public]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: test-key
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/l33
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          LLM_PROVIDER: openai

      - name: Typecheck
        run: npm run typecheck

